<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clippy's Slop Blaster</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; }
body {
  background:#008080;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  font-family:'Courier New',monospace;
  -webkit-user-select:none; user-select:none;
  touch-action:none;
}
#stage {
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
}
canvas {
  display:block;
  cursor:crosshair;
  image-rendering:pixelated;
  /* Scale down to fit small viewports; internal resolution stays fixed. */
  max-width:100vw;
  max-height:88vh;
  touch-action:none;
}
#instructions {
  color:#fff;
  font-size:11px;
  margin-top:6px;
  text-shadow:1px 1px #000;
  letter-spacing:.5px;
}

/* ── Mobile touch controls (hidden by default; shown via .touch on body) ── */
#touchUI { display:none; }
body.touch #touchUI {
  display:block;
  position:fixed;
  left:0; right:0; bottom:0;
  height:170px;
  pointer-events:none;
  z-index:20;
}
body.touch #instructions { display:none; }
.pad {
  position:absolute;
  pointer-events:auto;
  -webkit-user-select:none; user-select:none;
}
#dpad { left:14px; bottom:14px; width:150px; height:150px; }
#dpad .dbtn {
  position:absolute;
  width:48px; height:48px;
  background:rgba(192,192,192,0.82);
  border:2px solid #fff;
  border-right-color:#808080; border-bottom-color:#808080;
  color:#000080; font:bold 20px 'Courier New',monospace;
  display:flex; align-items:center; justify-content:center;
  border-radius:6px;
}
#dpad .dbtn:active { background:rgba(0,0,128,0.85); color:#fff; }
#dpad .up    { left:51px; top:0; }
#dpad .down  { left:51px; top:102px; }
#dpad .left  { left:0;   top:51px; }
#dpad .right { left:102px; top:51px; }
#fireBtn {
  right:18px; bottom:34px; width:104px; height:104px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff9944, #cc4400);
  border:3px solid #fff; box-shadow:0 4px 14px rgba(0,0,0,0.4);
  color:#fff; font:bold 18px 'Courier New',monospace;
  display:flex; align-items:center; justify-content:center;
  text-shadow:1px 1px #000;
}
#fireBtn:active { transform:translateY(2px); filter:brightness(1.15); }

/* On-screen initials entry (mobile game-over) */
#initialsForm {
  display:none;
  position:absolute;
  z-index:30;
  flex-direction:column;
  align-items:center;
  gap:8px;
  background:#c0c0c0;
  border:2px solid #fff; border-right-color:#808080; border-bottom-color:#808080;
  padding:12px 14px;
  font-family:'Courier New',monospace;
}
#initialsForm.show { display:flex; }
#initialsForm input {
  font:bold 28px 'Courier New',monospace;
  text-transform:uppercase;
  width:130px; text-align:center; letter-spacing:10px;
  border:2px inset #808080; padding:4px;
  background:#fff; color:#000;
}
#initialsForm .ifRow { display:flex; gap:8px; }
#initialsForm button {
  font:bold 13px 'Courier New',monospace;
  padding:6px 16px;
  background:#000080; color:#fff; border:1px solid #fff; cursor:pointer;
}
#initialsForm button.skip { background:#808080; }
#initialsForm .lbl { font:bold 11px 'Courier New',monospace; color:#000080; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="instructions">ARROWS/WASD = move &nbsp;|&nbsp; SPACE = shoot &nbsp;|&nbsp; ENTER = start</div>
  <form id="initialsForm" autocomplete="off">
    <div class="lbl">ENTER YOUR INITIALS</div>
    <input id="initialsInput" maxlength="3" inputmode="latin" placeholder="AAA" aria-label="initials">
    <div class="ifRow">
      <button type="submit">SUBMIT</button>
      <button type="button" id="skipBtn" class="skip">SKIP ✕</button>
    </div>
  </form>
</div>
<div id="touchUI">
  <div id="dpad" class="pad">
    <div class="dbtn up"    data-dir="up">▲</div>
    <div class="dbtn down"  data-dir="down">▼</div>
    <div class="dbtn left"  data-dir="left">◀</div>
    <div class="dbtn right" data-dir="right">▶</div>
  </div>
  <div id="fireBtn" class="pad">FIRE</div>
</div>
<script>
// ════════════════════════════════════════════════════════
//  CLIPPY'S SLOP BLASTER  —  a millennial fever dream
// ════════════════════════════════════════════════════════
const C   = document.getElementById('c');
const ctx = C.getContext('2d');
const W = C.width  = Math.min(820, window.innerWidth);
const H = C.height = Math.min(560, window.innerHeight - 30);
const HUD = 38;

// ── Content: AI slop vs human gems ──────────────────────
const SLOP = [
  ["In today's fast-paced digital","landscape, leveraging AI-driven","insights transforms your paradigm."],
  ["Unlocking the power of data-driven","results accelerates your journey","toward sustainable synergy."],
  ["This comprehensive guide walks you","through everything you need to know","about content optimization strategy."],
  ["As an AI language model, I","strive to provide accurate","and helpful information to all."],
  ["Hope this helps! Let me know if","you need further clarification","or have any other questions!"],
  ["Certainly! Here are 10 compelling","reasons to leverage this","transformative solution today."],
  ["Delve into crafting impactful","narratives that resonate deeply","with your target audience segments."],
  ["Embracing a holistic approach","involves nurturing mind, body,","and spirit in perfect alignment."],
  ["Great question! The answer really","depends on your specific use case","and individual circumstances here."],
  ["At the end of the day, delivering","value to key stakeholders remains","the core driver of success."],
  ["It's worth noting these","cutting-edge solutions significantly","enhance your performance metrics."],
  ["The paradigm shift necessitates","an agile, proactive response","from all forward-thinking orgs."],
  ["Supercharge your workflow with","our revolutionary AI-powered","productivity enhancement platform."],
  ["In conclusion, implementing these","industry-leading best practices","will drive meaningful outcomes."],
];

const GEMS = [
  ["My grandmother kept a jar of","pennies on the counter.","I never knew what for."],
  ["He always ordered the same thing:","coffee black and whatever pie","happened to be left over."],
  ["The cat knocked my thesis draft","off the desk. Three years,","scattered across the floor."],
  ["Tuesday rain sounds different","from Saturday morning rain.","I have no explanation."],
  ["She corrected my grammar mid-argument.","We stayed together anyway.","That was twenty years ago."],
  ["Every winter I forget how cold","it gets. Every winter I'm surprised.","Forty years of this."],
  ["He fixed watches for a living.","The house always sounded","like it was thinking."],
  ["We named the fish after senators.","The fish outlived most of them.","Byrd lasted six years."],
  ["I still have the rejection letter.","It's better written","than anything I submitted."],
  ["The vending machine took my dollar","but gave two granola bars.","I felt guilty for a week."],
  ["She kept passwords in a diary","labeled 'POEMS'.","Nobody ever checked poetry."],
  ["The stoplight was broken eleven years.","When fixed, everyone ran it","out of pure habit."],
  ["I asked if he was scared.","He said mostly annoyed he'd","never find out who did it."],
  ["My uncle said he'd learn guitar.","He died knowing four chords.","Perfect ones, though."],
];

// ── Clippy dialog tips ───────────────────────────────────
const TIPS = [
  ["It looks like you're being","targeted by AI slop!","Shoot the ORANGE blocks! ▶"],
  ["📎 Dodge the TEAL gems!","That's real human writing.","Don't shoot the soul out of it!"],
  ["Slop keywords to watch for:","'leverage', 'paradigm',","'holistic', 'synergy'"],
  ["Gems are specific and weird.","Slop is vague and helpful.","Choose your targets wisely."],
  ["It looks like you're trying","to save literature from AI.","Would you like help with that?"],
  ["WARNING: synergy levels","are critically high","in this sector. Shoot fast."],
  ["Letting slop pass costs a life.","Shooting gems costs a life.","Reading carefully costs nothing."],
  ["Fun fact: 97% of hot takes","were AI-generated. The 3% that","weren't were also pretty bad."],
];

// ── Stars ────────────────────────────────────────────────
const STARS = Array.from({length:130}, () => ({
  x: Math.random()*W,
  y: Math.random()*(H-HUD) + HUD,
  r: Math.random()*1.4+0.2,
  t: Math.random()*Math.PI*2,
}));

// ── State ────────────────────────────────────────────────
let state = 'title';
let score=0, lives=3, level=1, tick=0;
let nextSpawn=90, nextTip=350;
let tipMsg=null, tipTimer=0;
let shake=0;
const bullets=[], blocks=[], sparks=[];

// ── Leaderboard ──────────────────────────────────────────
const LB_API = "https://clippy-leaderboard.mark-30e.workers.dev";
let initials="", goPhase="enter", lbScores=[], myRank=0; // goPhase ∈ enter|sending|board|err

// ── Player ───────────────────────────────────────────────
const P = { x:W*0.12, y:H/2-20, w:34, h:44, spd:4.8 };

// ── Input ────────────────────────────────────────────────
const K={};
// Game-control keys we own: prevent default so they don't scroll the page
// (important when embedded in the egge.us overlay iframe) or leak to the parent.
const GAME_KEYS = new Set(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter']);
addEventListener('keydown', e=>{
  K[e.code]=true;
  if(GAME_KEYS.has(e.code)) e.preventDefault();
  if(e.code==='Space'){ if(state==='playing') fire(); }
  if(e.code==='Enter' && state==='title'){ start(); return; }

  // ── Game-over arcade flow ──
  if(state==='over'){
    if(goPhase==='enter'){
      if(/^Key[A-Z]$/.test(e.code)){
        if(initials.length<3) initials += e.code.slice(3); // append uppercase letter
      } else if(e.code==='Backspace'){
        e.preventDefault();
        initials = initials.slice(0,-1);
      } else if(e.code==='Enter'){
        if(initials.length>=1) submitScore();
      } else if(e.code==='Escape'){
        skipScore(); // skip without submitting; just show the board
      }
    } else if(goPhase==='board' || goPhase==='err'){
      if(e.code==='Enter') start();
    }
    return;
  }
});
addEventListener('keyup', e=>{ K[e.code]=false; });

// ── Submit score to leaderboard ──────────────────────────
async function submitScore(){
  goPhase='sending';
  try{
    const r = await fetch(LB_API+"/scores", {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:initials, score})
    });
    if(!r.ok) throw new Error('bad status '+r.status);
    const resp = await r.json();
    lbScores = resp.scores || [];
    myRank = resp.rank || 0;
    goPhase='board';
  }catch(err){
    goPhase='err';
  }
}

// ── Skip: don't submit a score, just show the board ──────
async function skipScore(){
  if(IS_TOUCH) hideInitialsForm();
  initials=''; myRank=0; // no row to highlight
  goPhase='sending';
  try{
    const r = await fetch(LB_API+"/scores"); // GET top 10, no POST
    if(!r.ok) throw new Error('bad status '+r.status);
    const resp = await r.json();
    lbScores = resp.scores || [];
    goPhase='board';
  }catch(err){
    goPhase='err';
  }
}

// ── Mobile / touch support ───────────────────────────────
const IS_TOUCH = matchMedia('(pointer: coarse)').matches || ('ontouchstart' in window);
const initialsForm  = document.getElementById('initialsForm');
const initialsInput = document.getElementById('initialsInput');

if(IS_TOUCH){
  document.body.classList.add('touch');

  // D-pad: press sets the matching movement flag, release clears it.
  const DIR_KEY = { up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight' };
  document.querySelectorAll('#dpad .dbtn').forEach(btn=>{
    const code = DIR_KEY[btn.dataset.dir];
    const press   = e=>{ e.preventDefault(); K[code]=true; };
    const release = e=>{ e.preventDefault(); K[code]=false; };
    btn.addEventListener('touchstart', press, {passive:false});
    btn.addEventListener('touchend',   release);
    btn.addEventListener('touchcancel',release);
    btn.addEventListener('mousedown',  press);
    btn.addEventListener('mouseup',    release);
    btn.addEventListener('mouseleave', release);
  });

  // FIRE button: fire while playing; repeat-fire when held.
  let fireHold=false, fireTimer=null;
  const fireBtn = document.getElementById('fireBtn');
  const startFire = e=>{
    e.preventDefault(); fireHold=true;
    if(state==='playing') fire();
    if(!fireTimer) fireTimer=setInterval(()=>{ if(fireHold && state==='playing') fire(); }, 120);
  };
  const stopFire = ()=>{ fireHold=false; if(fireTimer){ clearInterval(fireTimer); fireTimer=null; } };
  fireBtn.addEventListener('touchstart', startFire, {passive:false});
  fireBtn.addEventListener('touchend', stopFire);
  fireBtn.addEventListener('touchcancel', stopFire);
  fireBtn.addEventListener('mousedown', startFire);
  fireBtn.addEventListener('mouseup', stopFire);
  fireBtn.addEventListener('mouseleave', stopFire);
}

// On-screen initials entry (mobile game-over enter phase).
function showInitialsForm(){
  initialsInput.value='';
  initialsForm.classList.add('show');
  positionInitialsForm();
  setTimeout(()=>initialsInput.focus(), 30);
}
function hideInitialsForm(){ initialsForm.classList.remove('show'); }
function positionInitialsForm(){
  // Center the form over the canvas (which may be CSS-scaled).
  const r=C.getBoundingClientRect();
  const fw=initialsForm.offsetWidth||190;
  initialsForm.style.left = (r.left + r.width/2 - fw/2) + 'px';
  initialsForm.style.top  = (r.top  + r.height*0.52) + 'px';
}
initialsForm.addEventListener('submit', e=>{
  e.preventDefault();
  const v=(initialsInput.value||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,3);
  if(v.length>=1){ initials=v; hideInitialsForm(); submitScore(); }
});
document.getElementById('skipBtn').addEventListener('click', e=>{
  e.preventDefault();
  skipScore(); // no submission; show the board
});
addEventListener('resize', ()=>{ if(initialsForm.classList.contains('show')) positionInitialsForm(); });

// Map a client (touch/mouse) point to canvas coordinates (handles CSS scaling).
function canvasPoint(clientX, clientY){
  const r=C.getBoundingClientRect();
  return { x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height) };
}
// Tap-to-start / tap-to-play-again on the canvas (title + game-over board/err).
// During the initials step, a click on the title-bar [X] skips submitting.
function handleCanvasTap(px, py){
  if(state==='title'){ start(); return; }
  if(state==='over'){
    if(goPhase==='enter' && px!=null){
      const xb=goCloseRect();
      if(px>=xb.x-4 && px<=xb.x+xb.w+4 && py>=xb.y-4 && py<=xb.y+xb.h+4){ skipScore(); return; }
    }
    if(goPhase==='board' || goPhase==='err'){ start(); return; }
  }
  // (enter phase otherwise uses keyboard / the on-screen initials form)
}
C.addEventListener('click', e=>{ const p=canvasPoint(e.clientX,e.clientY); handleCanvasTap(p.x,p.y); });
C.addEventListener('touchend', e=>{
  e.preventDefault();
  const t=e.changedTouches && e.changedTouches[0];
  if(t){ const p=canvasPoint(t.clientX,t.clientY); handleCanvasTap(p.x,p.y); }
  else handleCanvasTap();
}, {passive:false});

// ── Helpers ──────────────────────────────────────────────
const rnd  = (a,b)=> a + Math.random()*(b-a);
const rndI = (a,b)=> a + Math.floor(Math.random()*(b-a));
const pick = arr  => arr[rndI(0,arr.length)];
const clmp = (v,a,b)=> Math.max(a,Math.min(b,v));

// ── Game logic ───────────────────────────────────────────
function start(){
  state='playing'; score=0; lives=3; level=1; tick=0;
  nextSpawn=90; nextTip=350; tipMsg=null; shake=0;
  bullets.length=0; blocks.length=0; sparks.length=0;
  P.x=W*0.12; P.y=H/2-20;
  if(IS_TOUCH) hideInitialsForm();
}

function fire(){
  // Rate-limit: one bullet per 10 ticks
  if(bullets.length>0 && tick - bullets[bullets.length-1].born < 10) return;
  bullets.push({ x:P.x+P.w, y:P.y+P.h/2, vx:13, born:tick });
}

function spawn(){
  const isSlop = Math.random()<0.55;
  const bh=82, bw=222;
  const by = rnd(HUD+6, H-bh-6);
  const spd = 1.6 + level*0.35 + Math.random()*0.4;
  blocks.push({
    x:W+4, y:by, w:bw, h:bh,
    vx:-spd, isSlop,
    lines: pick(isSlop?SLOP:GEMS),
    alpha:1, dead:false, age:0,
  });
}

function burst(x,y,col,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=rnd(1,5);
    sparks.push({x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, col, r:rnd(2,4)});
  }
}

// ── Update ───────────────────────────────────────────────
function update(){
  if(state!=='playing') return;
  tick++;

  // Move player
  if(K['ArrowUp']   ||K['KeyW']) P.y -= P.spd;
  if(K['ArrowDown'] ||K['KeyS']) P.y += P.spd;
  if(K['ArrowLeft'] ||K['KeyA']) P.x -= P.spd;
  if(K['ArrowRight']||K['KeyD']) P.x += P.spd;
  P.x = clmp(P.x, 8, W*0.52-P.w);
  P.y = clmp(P.y, HUD+4, H-P.h-4);

  // Spawn blocks
  if(tick >= nextSpawn){
    spawn();
    nextSpawn = tick + Math.max(28, 95 - level*9) + rndI(0,25);
  }

  // Level = every 800 pts
  level = 1 + Math.floor(score/800);

  // Clippy tip
  if(tick >= nextTip){
    tipMsg = pick(TIPS); tipTimer=220;
    nextTip = tick + rndI(380,600);
  }
  if(tipTimer>0 && --tipTimer===0) tipMsg=null;

  // Bullets
  for(let i=bullets.length-1; i>=0; i--){
    const b=bullets[i]; b.x+=b.vx;
    if(b.x>W){ bullets.splice(i,1); continue; }
    let used=false;
    for(let j=blocks.length-1; j>=0; j--){
      const bl=blocks[j]; if(bl.dead) continue;
      if(b.x>bl.x&&b.x<bl.x+bl.w&&b.y>bl.y&&b.y<bl.y+bl.h){
        bullets.splice(i,1); bl.dead=true; used=true;
        if(bl.isSlop){
          score+=100; shake=7;
          burst(bl.x+bl.w/2, bl.y+bl.h/2, '#ff7700', 16);
        } else {
          score=Math.max(0,score-50); lives--; shake=18;
          burst(bl.x+bl.w/2, bl.y+bl.h/2, '#00ffcc', 20);
          tipMsg=["You shot a GEM!","That was real writing!","–50 pts & a life gone."];
          tipTimer=160;
        }
        break;
      }
    }
    if(used) continue;
  }

  // Blocks
  for(let i=blocks.length-1; i>=0; i--){
    const b=blocks[i]; b.x+=b.vx; b.age++;
    if(b.dead){ b.alpha-=0.09; if(b.alpha<=0) blocks.splice(i,1); continue; }

    // Hit player
    if(b.x<P.x+P.w && b.x+b.w>P.x && b.y<P.y+P.h && b.y+b.h>P.y){
      b.dead=true; lives--; shake=20;
      burst(P.x+P.w/2, P.y+P.h/2, '#ff4444', 22);
      continue;
    }

    // Off screen left
    if(b.x+b.w < 0){
      blocks.splice(i,1);
      if(b.isSlop){ lives--; score=Math.max(0,score-15); shake=10; }
      else { score+=20; }
    }
  }

  // Sparks
  for(let i=sparks.length-1; i>=0; i--){
    const s=sparks[i];
    s.x+=s.vx; s.y+=s.vy; s.vx*=0.91; s.vy*=0.91; s.life-=0.03;
    if(s.life<=0) sparks.splice(i,1);
  }

  if(shake>0) shake*=0.82;
  if(lives<=0){
    lives=0; state='over'; shake=0; goPhase='enter'; initials='';
    if(IS_TOUCH) showInitialsForm();
  }
}

// ── Draw helpers ─────────────────────────────────────────
function drawStars(){
  STARS.forEach(s=>{
    s.t+=0.018;
    const a=0.35+0.45*Math.sin(s.t);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
}

// Draw Clippy the Paperclip (canvas-drawn mascot)
function drawClippy(cx,cy,sc=1){
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sc,sc);

  const lw = 3.2/sc;
  ctx.strokeStyle='#c8c8c8'; ctx.lineWidth=lw;
  ctx.lineCap='round'; ctx.lineJoin='round';

  // Outer loop
  ctx.beginPath();
  ctx.moveTo(0,-22); ctx.bezierCurveTo(16,-22,20,-10,20,0);
  ctx.bezierCurveTo(20,13,11,20,0,20);
  ctx.bezierCurveTo(-11,20,-20,13,-20,0);
  ctx.bezierCurveTo(-20,-10,-16,-22,0,-22);
  ctx.stroke();

  // Inner loop
  ctx.beginPath();
  ctx.moveTo(0,-8); ctx.bezierCurveTo(8,-8,9,-2,9,4);
  ctx.bezierCurveTo(9,10,4,14,0,14);
  ctx.bezierCurveTo(-4,14,-9,10,-9,4);
  ctx.bezierCurveTo(-9,-2,-8,-8,0,-8);
  ctx.stroke();

  // Bottom hook
  ctx.beginPath();
  ctx.moveTo(0,14); ctx.bezierCurveTo(-2,20,5,24,0,27);
  ctx.stroke();

  // Eyes
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-5,2,2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,2,2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-3.8,0.8,1.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6.2,0.8,1.1,0,Math.PI*2); ctx.fill();

  // Smile
  ctx.strokeStyle='#111'; ctx.lineWidth=1.6/sc;
  ctx.beginPath(); ctx.arc(0,7,4.5,0.2,Math.PI-0.2); ctx.stroke();

  ctx.restore();
}

function drawHUD(){
  const g=ctx.createLinearGradient(0,0,W,HUD);
  g.addColorStop(0,'#000080'); g.addColorStop(1,'#1a6cc4');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,HUD);

  // Win95 groove
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,HUD-1); ctx.lineTo(W,HUD-1); ctx.stroke();

  ctx.fillStyle='#fff'; ctx.font='bold 13px "Courier New"';
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText('📎 CLIPPY\'S SLOP BLASTER', 10, HUD/2);

  // Right side stats
  ctx.textAlign='right';
  const hearts = '❤'.repeat(lives);
  ctx.fillText(`LVL ${level}   ${hearts}   ${score} pts`, W-10, HUD/2);
  ctx.textAlign='left';
}

function drawBlock(b){
  ctx.save(); ctx.globalAlpha=b.alpha;
  const {x,y,w,h,isSlop,lines}=b;
  const col  = isSlop ? '#ff7700' : '#00ccaa';
  const tcol = isSlop ? '#ffbb77' : '#88ffee';

  // Glow border
  ctx.shadowColor=col; ctx.shadowBlur=14;
  ctx.fillStyle='rgba(0,0,18,0.88)';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=col; ctx.lineWidth=2;
  ctx.strokeRect(x+1,y+1,w-2,h-2);
  ctx.shadowBlur=0;

  // Corner badge
  ctx.fillStyle=col; ctx.font='bold 9px "Courier New"';
  ctx.textBaseline='top';
  ctx.fillText(isSlop ? '⚠ SLOP' : '💎 GEM', x+5, y+4);

  // Text lines
  ctx.fillStyle=tcol; ctx.font='9.5px "Courier New"';
  lines.forEach((ln,i)=> ctx.fillText(ln, x+5, y+18+i*19));

  ctx.restore();
}

function drawPlayer(){
  const cx=P.x+P.w/2, cy=P.y+P.h/2;
  // Thruster flame
  ctx.save();
  const flen = 12 + Math.random()*8;
  const fg = ctx.createRadialGradient(P.x-5,cy,0, P.x-5,cy,flen);
  fg.addColorStop(0,'rgba(0,180,255,0.9)');
  fg.addColorStop(0.5,'rgba(0,80,255,0.5)');
  fg.addColorStop(1,'rgba(0,0,255,0)');
  ctx.fillStyle=fg;
  ctx.beginPath();
  ctx.ellipse(P.x-5,cy, flen, 9, Math.PI, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  drawClippy(cx,cy,1.05);
}

function drawSpark(s){
  ctx.save(); ctx.globalAlpha=s.life;
  ctx.fillStyle=s.col; ctx.shadowColor=s.col; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(s.x,s.y, s.r*s.life, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTipBubble(){
  if(!tipMsg) return;
  const bw=220, bh=98, bx=W-bw-8, by=H-bh-8;

  ctx.save();
  // Win95 window
  ctx.fillStyle='#c0c0c0';
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(bx,by+bh); ctx.lineTo(bx,by); ctx.lineTo(bx+bw,by); ctx.stroke();
  ctx.strokeStyle='#808080';
  ctx.beginPath();
  ctx.moveTo(bx+bw,by); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx,by+bh); ctx.stroke();

  // Title bar
  const tg=ctx.createLinearGradient(bx,by,bx,by+20);
  tg.addColorStop(0,'#000080'); tg.addColorStop(1,'#1a6cc4');
  ctx.fillStyle=tg; ctx.fillRect(bx+2,by+2,bw-4,20);
  ctx.fillStyle='#fff'; ctx.font='bold 10px Arial';
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText('📎 Clippy', bx+6, by+12);
  // Close btn
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(bx+bw-20,by+3,16,14);
  ctx.strokeStyle='#808080'; ctx.lineWidth=1;
  ctx.strokeRect(bx+bw-20,by+3,16,14);
  ctx.strokeStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(bx+bw-20,by+3); ctx.lineTo(bx+bw-4,by+3);
  ctx.moveTo(bx+bw-20,by+3); ctx.lineTo(bx+bw-20,by+17);
  ctx.stroke();
  ctx.fillStyle='#000'; ctx.font='10px Arial';
  ctx.textAlign='center';
  ctx.fillText('✕', bx+bw-12, by+10);

  // Clippy icon
  drawClippy(bx+22, by+64, 0.75);

  // Text
  ctx.fillStyle='#000'; ctx.font='10px "Courier New"';
  ctx.textBaseline='top'; ctx.textAlign='left';
  tipMsg.forEach((ln,i)=> ctx.fillText(ln, bx+44, by+28+i*14));

  ctx.restore();
}

// ── Screens ──────────────────────────────────────────────
function drawTitle(){
  ctx.fillStyle='#000018'; ctx.fillRect(0,0,W,H);
  drawStars();

  const dw=Math.min(540,W-20), dh=350;
  const dx=(W-dw)/2, dy=(H-dh)/2;

  // Dialog window
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(dx,dy+dh); ctx.lineTo(dx,dy); ctx.lineTo(dx+dw,dy); ctx.stroke();
  ctx.strokeStyle='#808080';
  ctx.beginPath();
  ctx.moveTo(dx+dw,dy); ctx.lineTo(dx+dw,dy+dh); ctx.lineTo(dx,dy+dh); ctx.stroke();

  // Title bar
  const g=ctx.createLinearGradient(dx,dy,dx,dy+26);
  g.addColorStop(0,'#000080'); g.addColorStop(1,'#1a6cc4');
  ctx.fillStyle=g; ctx.fillRect(dx+2,dy+2,dw-4,26);
  ctx.fillStyle='#fff'; ctx.font='bold 12px Arial';
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText('📎 Clippy\'s Slop Blaster — v1.0', dx+8, dy+15);
  // Close / min / max
  [dw-22,dw-38,dw-54].forEach((ox,k)=>{
    ctx.fillStyle='#c0c0c0'; ctx.fillRect(dx+ox,dy+5,16,16);
    ctx.strokeStyle='#808080'; ctx.lineWidth=1; ctx.strokeRect(dx+ox,dy+5,16,16);
    ctx.strokeStyle='#fff';
    ctx.beginPath();
    ctx.moveTo(dx+ox,dy+5); ctx.lineTo(dx+ox+16,dy+5);
    ctx.moveTo(dx+ox,dy+5); ctx.lineTo(dx+ox,dy+21);
    ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='10px Arial'; ctx.textAlign='center';
    ctx.fillText(['✕','▢','_'][k], dx+ox+8, dy+13);
  });

  // Big Clippy
  drawClippy(dx+78, dy+185, 3);

  // Game title
  ctx.fillStyle='#000080'; ctx.font=`bold ${Math.min(26,dw/18)}px "Courier New"`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText("CLIPPY'S SLOP BLASTER", W/2+40, dy+40);

  // Subtitle
  ctx.fillStyle='#333'; ctx.font=`italic 11px "Courier New"`;
  ctx.fillText('"It looks like you\'re trying to save literature!"', W/2+40, dy+72);

  // Instructions panel
  ctx.fillStyle='#f0f0f0';
  ctx.fillRect(dx+140, dy+90, dw-150, 200);
  ctx.strokeStyle='#808080'; ctx.lineWidth=1;
  ctx.strokeRect(dx+140, dy+90, dw-150, 200);

  ctx.fillStyle='#000'; ctx.font='11px "Courier New"';
  ctx.textAlign='left'; ctx.textBaseline='top';
  const tx=dx+150, ty=dy+100;
  [
    '📌 Text blocks scroll from the right.',
    '',
    '⚠ ORANGE = AI SLOP  →  SHOOT IT',
    '💎 TEAL  = HUMAN GEM →  DODGE IT',
    '',
    '✔ Blast slop:     +100 pts',
    '✔ Gem slips past: +20 pts',
    '✘ Shoot a gem:    −50 pts + lose ❤',
    '✘ Slop hits you:  lose ❤',
    '✘ Slop escapes:   lose ❤',
    '',
    '⬆⬇⬅➡  Move    SPACE  Shoot',
  ].forEach((ln,i)=>{ ctx.fillText(ln, tx, ty+i*16); });

  // Press Enter button (pulsing)
  const pulse=0.6+0.4*Math.sin(tick*0.06);
  ctx.fillStyle=`rgba(0,0,128,${pulse})`;
  ctx.fillRect(W/2-60, dy+dh-46, 120+80*(pulse-0.6), 30);
  ctx.strokeStyle=pulse>0.8?'#fff':'#aaa'; ctx.lineWidth=1.5;
  ctx.strokeRect(W/2-60, dy+dh-46, 120+80*(pulse-0.6), 30);
  ctx.fillStyle='#fff'; ctx.font='bold 13px "Courier New"';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(IS_TOUCH ? '▶  TAP TO START  ◀' : '▶  PRESS ENTER  ◀', W/2+20*(pulse-0.6), dy+dh-31);

  // Portrait hint
  if(IS_TOUCH && H>W){
    ctx.fillStyle='#800000'; ctx.font='bold 11px "Courier New"';
    ctx.fillText('↻ best in landscape', W/2, dy+dh-12);
  }
}

// Game-over dialog geometry (kept in sync with drawGameOver).
const GO_DW=360, GO_DH=340;
function goDialog(){ return { dw:GO_DW, dh:GO_DH, dx:(W-GO_DW)/2, dy:(H-GO_DH)/2 }; }
// Title-bar [X] (skip) button rect.
function goCloseRect(){
  const {dx,dy,dw}=goDialog();
  return { x:dx+dw-22, y:dy+5, w:17, h:17 };
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);

  const dw=GO_DW,dh=GO_DH, dx=(W-dw)/2, dy=(H-dh)/2;
  const cx=dx+dw/2;
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(dx,dy+dh); ctx.lineTo(dx,dy); ctx.lineTo(dx+dw,dy); ctx.stroke();
  ctx.strokeStyle='#808080';
  ctx.beginPath();
  ctx.moveTo(dx+dw,dy); ctx.lineTo(dx+dw,dy+dh); ctx.lineTo(dx,dy+dh); ctx.stroke();

  const tg=ctx.createLinearGradient(dx,dy,dx,dy+26);
  tg.addColorStop(0,'#800000'); tg.addColorStop(1,'#c00000');
  ctx.fillStyle=tg; ctx.fillRect(dx+2,dy+2,dw-4,26);
  ctx.fillStyle='#fff'; ctx.font='bold 12px Arial';
  ctx.textBaseline='middle'; ctx.textAlign='left';
  ctx.fillText('❌ FATAL ERROR — Literature Lost', dx+8, dy+15);

  // Win95 [X] close button in the title bar — during the initials step it
  // SKIPS submitting and just shows the board. (Click handled on canvas.)
  if(goPhase==='enter'){
    const xb=goCloseRect();
    ctx.fillStyle='#c0c0c0'; ctx.fillRect(xb.x,xb.y,xb.w,xb.h);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(xb.x,xb.y); ctx.lineTo(xb.x+xb.w,xb.y); ctx.lineTo(xb.x,xb.y); ctx.lineTo(xb.x,xb.y+xb.h); ctx.stroke();
    ctx.strokeStyle='#808080';
    ctx.beginPath(); ctx.moveTo(xb.x+xb.w,xb.y); ctx.lineTo(xb.x+xb.w,xb.y+xb.h); ctx.lineTo(xb.x,xb.y+xb.h); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 12px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✕', xb.x+xb.w/2, xb.y+xb.h/2+1);
  }

  if(goPhase==='enter'){
    ctx.fillStyle='#000'; ctx.font='bold 22px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('GAME OVER', cx, dy+42);
    ctx.font='13px "Courier New"';
    ctx.fillText(`Final Score: ${score}`, cx, dy+78);
    ctx.fillText(`Level Reached: ${level}`, cx, dy+98);

    ctx.font='bold 13px "Courier New"'; ctx.fillStyle='#000080';
    ctx.fillText('ENTER YOUR INITIALS', cx, dy+136);

    // 3 initial slots with blinking cursor
    const padded = (initials + '   ').slice(0,3);
    const cur = (Math.floor(tick/16)%2===0) && initials.length<3;
    ctx.font='bold 38px "Courier New"';
    const slotW=46, totalW=slotW*3, sx=cx-totalW/2;
    for(let i=0;i<3;i++){
      const chx=sx+i*slotW+slotW/2;
      const ch = i<initials.length ? initials[i] : (i===initials.length && cur ? '_' : ' ');
      ctx.fillStyle = i<initials.length ? '#000' : '#000080';
      ctx.fillText(ch, chx, dy+162);
      // underline
      ctx.strokeStyle='#808080'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(chx-16, dy+208); ctx.lineTo(chx+16, dy+208); ctx.stroke();
    }

    ctx.fillStyle='#444'; ctx.font='10px "Courier New"';
    ctx.fillText(IS_TOUCH ? 'enter initials below · SUBMIT' : 'type 3 letters · ENTER to submit', cx, dy+232);
    ctx.fillStyle='#666'; ctx.font='9px "Courier New"';
    ctx.fillText(IS_TOUCH ? 'or SKIP ✕ to just see the board' : 'or [✕] / Esc to skip & see the board', cx, dy+248);

    drawClippy(dx+44, dy+dh-46, 1.4);

  } else if(goPhase==='sending'){
    drawClippy(cx, dy+150, 2.4);
    ctx.fillStyle='#000'; ctx.font='bold 16px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('Saving score…', cx, dy+232);

  } else if(goPhase==='board'){
    ctx.fillStyle='#000080'; ctx.font='bold 15px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('🏆 TOP SLOP BLASTERS', cx, dy+38);

    const rows = lbScores.slice(0,10);
    ctx.font='12px "Courier New"'; ctx.textBaseline='top';
    const lx=dx+22, rx=dx+dw-22, ry=dy+66, rh=20;
    let highlighted=false;
    rows.forEach((s,i)=>{
      const y=ry+i*rh;
      const isMe = !highlighted && (i+1)===myRank && s.name===initials && s.score===score;
      if(isMe){
        highlighted=true;
        ctx.fillStyle='#000080'; ctx.fillRect(dx+8, y-2, dw-16, rh-2);
      }
      ctx.fillStyle = isMe ? '#fff' : '#000';
      const rank=String(i+1).padStart(2,' ');
      const nm=(s.name||'???').padEnd(3,' ');
      const sc=String(s.score);
      ctx.textAlign='left';
      ctx.fillText(`${rank}. ${nm}`, lx, y);
      // dotted leader
      ctx.fillStyle = isMe ? '#bcd' : '#888';
      const dotsStart=lx+78, dotsEnd=rx-(sc.length*7.2)-4;
      ctx.font='12px "Courier New"';
      let dots='';
      for(let dxp=dotsStart; dxp<dotsEnd; dxp+=6) dots+='.';
      ctx.fillText(dots, dotsStart, y);
      ctx.fillStyle = isMe ? '#fff' : '#000';
      ctx.textAlign='right';
      ctx.fillText(sc, rx, y);
    });

    if(rows.length===0){
      ctx.fillStyle='#444'; ctx.font='12px "Courier New"'; ctx.textAlign='center';
      ctx.fillText('(no scores yet)', cx, ry+10);
    }

    // your rank if outside top 10
    if(myRank>10){
      ctx.fillStyle='#800000'; ctx.font='bold 12px "Courier New"'; ctx.textAlign='center';
      ctx.fillText(`Your rank: #${myRank}`, cx, dy+dh-66);
    }

    ctx.fillStyle='#000080';
    ctx.fillRect(cx-90, dy+dh-44, 180, 30);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.strokeRect(cx-90, dy+dh-44, 180, 30);
    ctx.fillStyle='#fff'; ctx.font='bold 12px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(IS_TOUCH ? 'TAP TO PLAY AGAIN' : 'ENTER = Play Again', cx, dy+dh-29);

  } else { // err
    drawClippy(cx, dy+140, 2);
    ctx.fillStyle='#000'; ctx.font='13px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('Couldn’t reach leaderboard.', cx, dy+212);
    ctx.fillText(`Final Score: ${score}`, cx, dy+234);

    ctx.fillStyle='#000080';
    ctx.fillRect(cx-90, dy+dh-44, 180, 30);
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.strokeRect(cx-90, dy+dh-44, 180, 30);
    ctx.fillStyle='#fff'; ctx.font='bold 12px "Courier New"';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(IS_TOUCH ? 'TAP TO PLAY AGAIN' : 'ENTER = Play Again', cx, dy+dh-29);
  }
}

// ── Main render ──────────────────────────────────────────
function render(){
  ctx.save();
  if(shake>0.5 && state!=='over'){
    ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);
  }

  if(state==='title'){
    drawTitle(); ctx.restore(); return;
  }

  ctx.fillStyle='#000018'; ctx.fillRect(0,0,W,H);
  drawStars();
  drawHUD();

  // Vertical divider hint (player zone)
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=1; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.moveTo(W*0.52,HUD); ctx.lineTo(W*0.52,H); ctx.stroke();
  ctx.setLineDash([]);

  blocks.forEach(drawBlock);
  sparks.forEach(drawSpark);
  drawPlayer();

  // Bullets
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor='#ffff00'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffff55';
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  drawTipBubble();
  if(state==='over') drawGameOver();
  ctx.restore();
}

// ── Loop ─────────────────────────────────────────────────
function loop(){
  update(); render(); requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
