name: Deploy to Cloudflare Pages

# Push to main → build the Astro site and deploy it to the "egge-us"
# Cloudflare Pages project (production). Also runnable on demand from the
# Actions tab via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Use the project's own wrangler (v4, via npm ci) rather than
      # wrangler-action's bundled v3 — matches local deploys exactly.
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=egge-us --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
